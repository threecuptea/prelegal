services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: prelegal
      POSTGRES_USER: prelegal
      POSTGRES_PASSWORD: prelegal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prelegal -d prelegal"]
      interval: 5s
      timeout: 5s
      retries: 5

  prelegal:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://prelegal:prelegal@postgres:5432/prelegal
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
